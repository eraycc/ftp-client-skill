<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FTP Proxy Manager</title>
<!-- CodeMirror 5 CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/theme/material-ocean.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/yaml/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/clike/clike.min.js"></script>

<style>
/* ===== RESET & TOKENS ===== */
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2129; --surface: #21262d;
  --border: #30363d; --border2: #484f58;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --accent: #58a6ff; --accent2: #79c0ff;
  --green: #3fb950; --green2: #56d364;
  --red: #f85149; --yellow: #d29922; --orange: #db6d28; --purple: #bc8cff;
  --radius: 10px; --radius-sm: 6px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 15px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::selection { background: rgba(88,166,255,0.3); }

/* ===== LAYOUT ===== */
.app { max-width: 1200px; margin: 0 auto; padding: 16px; }
.app-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.app-header h1 { font-size:1.5rem; font-weight:700; white-space:nowrap; }
.app-header h1 .ico { font-size:1.3rem; }
.app-header h1 .hl { color: var(--accent); }
.app-header .tagline { color: var(--text2); font-size:.85rem; }

/* ===== CARD ===== */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
.card-head { padding: 14px 18px; display:flex; align-items:center; gap:10px; border-bottom: 1px solid var(--border); cursor:pointer; user-select:none; }
.card-head h2 { font-size: .95rem; font-weight: 600; flex:1; }
.card-head .toggle { color: var(--text3); font-size:.8rem; transition: transform var(--transition); }
.card-head .toggle.open { transform: rotate(90deg); }
.card-body { padding: 18px; }
.card.collapsed .card-body { display:none; }

/* ===== FORM ===== */
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size:.78rem; color:var(--text2); font-weight:500; text-transform:uppercase; letter-spacing:.3px; }
.form-group input, .form-group select, .form-group textarea {
  background: var(--bg); border:1px solid var(--border); color:var(--text);
  padding:9px 12px; border-radius:var(--radius-sm); font-size:.88rem;
  outline:none; transition: border-color var(--transition);
  font-family: inherit;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
.form-group textarea { resize:vertical; min-height:80px; font-family:'SF Mono',Consolas,'Courier New',monospace; font-size:.82rem; }

/* ===== BUTTONS ===== */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border:1px solid transparent; border-radius:var(--radius-sm); cursor:pointer; font-size:.85rem; font-weight:600; transition: all var(--transition); white-space:nowrap; font-family:inherit; }
.btn:active { transform: scale(0.97); }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-success { background:var(--green); color:#fff; }
.btn-success:hover { background:var(--green2); }
.btn-danger { background:var(--red); color:#fff; }
.btn-danger:hover { background:#f97583; }
.btn-ghost { background:transparent; color:var(--text2); border-color:var(--border); }
.btn-ghost:hover { color:var(--text); border-color:var(--border2); background:var(--surface); }
.btn-sm { padding:5px 10px; font-size:.8rem; }
.btn-xs { padding:3px 7px; font-size:.75rem; border-radius:4px; }
.btn-icon { padding:6px 8px; font-size:.9rem; min-width:32px; justify-content:center; }
.btn-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.btn-row.mt { margin-top:14px; }

/* ===== STATUS TOAST ===== */
.toast { position:fixed; top:20px; right:20px; z-index:9999; padding:12px 20px; border-radius:var(--radius-sm); font-size:.85rem; font-weight:500; box-shadow:var(--shadow); transform:translateX(120%); transition:transform 0.3s ease; max-width:90vw; }
.toast.show { transform:translateX(0); }
.toast.ok { background:var(--green); color:#fff; }
.toast.err { background:var(--red); color:#fff; }
.toast.info { background:var(--accent); color:#fff; }

/* ===== PATH BAR ===== */
.pathbar { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 16px; margin-bottom:12px; display:flex; align-items:center; gap:2px; flex-wrap:wrap; font-size:.88rem; overflow-x:auto; }
.pathbar .seg { color:var(--accent); cursor:pointer; padding:2px 4px; border-radius:3px; }
.pathbar .seg:hover { background:rgba(88,166,255,0.12); text-decoration:underline; }
.pathbar .sep { color:var(--text3); padding:0 1px; }
.pathbar .current { color:var(--yellow); font-weight:600; }

/* ===== TOOLBAR ===== */
.toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
.toolbar .spacer { flex:1; }

/* ===== FILE TABLE ===== */
.ftable-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:16px; }
.ftable { width:100%; border-collapse:collapse; }
.ftable th { background:var(--bg3); text-align:left; padding:10px 14px; font-size:.76rem; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
.ftable td { padding:8px 14px; font-size:.86rem; border-bottom:1px solid rgba(48,54,61,0.5); vertical-align:middle; }
.ftable tbody tr { transition:background var(--transition); }
.ftable tbody tr:hover { background:rgba(88,166,255,0.04); }
.ftable tbody tr:last-child td { border-bottom:none; }
.fname { cursor:pointer; color:var(--accent); transition:color var(--transition); }
.fname:hover { color:var(--accent2); text-decoration:underline; }
.fdir { color:var(--yellow); font-weight:600; }
.flink { color:var(--purple); }
.ftype-icon { margin-right:6px; }
.factions { display:flex; gap:4px; flex-wrap:wrap; }
.empty-msg { text-align:center; padding:40px 20px; color:var(--text3); }

/* Mobile: hide size/date columns */
@media (max-width: 640px) {
  .ftable .col-size, .ftable .col-date { display:none; }
  .ftable td, .ftable th { padding: 8px 10px; }
}

/* ===== LOG PANEL ===== */
.log-body { padding:12px 16px; font-family:'SF Mono',Consolas,monospace; font-size:.78rem; max-height:200px; overflow-y:auto; color:var(--text3); white-space:pre-wrap; word-break:break-all; }

/* ===== MODAL ===== */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:1000; display:none; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
.modal-overlay.active { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); width:100%; max-height:90vh; display:flex; flex-direction:column; box-shadow:var(--shadow); }
.modal-sm { max-width:500px; }
.modal-lg { max-width:900px; }
.modal-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.modal-head h3 { flex:1; font-size:1rem; }
.modal-head .close-btn { background:none; border:none; color:var(--text3); font-size:1.2rem; cursor:pointer; padding:4px; line-height:1; }
.modal-head .close-btn:hover { color:var(--text); }
.modal-body { padding:20px; overflow-y:auto; flex:1; }
.modal-foot { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; flex-shrink:0; }

/* ===== EDITOR MODAL ===== */
.editor-toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.editor-toolbar .fpath { color:var(--yellow); font-family:monospace; font-size:.85rem; word-break:break-all; flex:1; }
.editor-toolbar .finfo { color:var(--text3); font-size:.78rem; }
.editor-status { display:flex; gap:12px; align-items:center; padding-top:10px; font-size:.78rem; color:var(--text3); }
.editor-status .modified { color:var(--orange); font-weight:600; }

/* CodeMirror overrides */
.CodeMirror { height:100%; font-size:.88rem; font-family:'SF Mono',Consolas,'Courier New',monospace; border-radius:var(--radius-sm); border:1px solid var(--border); }
.cm-wrap { flex:1; min-height:0; overflow:hidden; border-radius:var(--radius-sm); }
/* Make search dialog look better */
.CodeMirror-dialog { background:var(--bg3)!important; border-bottom:1px solid var(--border)!important; color:var(--text)!important; padding:6px 12px!important; }
.CodeMirror-dialog input { background:var(--bg)!important; border:1px solid var(--border)!important; color:var(--text)!important; padding:4px 8px!important; border-radius:4px!important; outline:none!important; }
.CodeMirror-dialog input:focus { border-color:var(--accent)!important; }
.CodeMirror-dialog button { background:var(--surface)!important; color:var(--text2)!important; border:1px solid var(--border)!important; padding:3px 10px!important; border-radius:4px!important; cursor:pointer!important; margin-left:4px!important; }

/* ===== UPLOAD ZONE ===== */
.upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:30px 20px; text-align:center; color:var(--text3); cursor:pointer; transition:all var(--transition); }
.upload-zone:hover, .upload-zone.dragover { border-color:var(--accent); color:var(--accent); background:rgba(88,166,255,0.04); }
.upload-zone .uz-icon { font-size:2rem; margin-bottom:8px; }
.upload-zone .uz-text { font-size:.85rem; }
.upload-zone .uz-hint { font-size:.75rem; margin-top:4px; color:var(--text3); }

/* ===== CONFIG EXPORT BOX ===== */
.config-box { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; font-family:'SF Mono',Consolas,monospace; font-size:.8rem; color:var(--accent); word-break:break-all; cursor:pointer; user-select:all; transition:background var(--transition); position:relative; }
.config-box:hover { background:var(--bg3); }
.config-box:active { background:var(--surface); }
.config-box .copy-hint { position:absolute; top:4px; right:8px; font-size:.7rem; color:var(--text3); font-family:sans-serif; pointer-events:none; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  html { font-size:14px; }
  .app { padding:10px; }
  .form-grid { grid-template-columns:1fr; }
  .modal { max-height:95vh; }
  .modal-body { padding:14px; }
  .editor-toolbar { flex-direction:column; align-items:flex-start; }
}
@media (max-width: 480px) {
  html { font-size:13px; }
  .app-header h1 { font-size:1.2rem; }
  .btn { padding:6px 12px; font-size:.8rem; }
  .btn-sm { padding:4px 8px; font-size:.75rem; }
  .pathbar { font-size:.82rem; padding:8px 12px; }
}

/* ===== SPINNER ===== */
.spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-overlay { position:absolute; inset:0; background:rgba(13,17,23,0.7); display:flex; align-items:center; justify-content:center; z-index:10; border-radius:var(--radius); }
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <div class="app-header">
    <h1><span class="ico">📂</span> <span class="hl">FTP Proxy</span> Manager</h1>
    <span class="tagline">通过 HTTP 代理管理远程 FTP / FTPS 服务器</span>
  </div>

  <!-- ===== CONNECTION CARD ===== -->
  <div class="card" id="connCard">
    <div class="card-head" onclick="toggleCard('connCard')">
      <h2>🔗 连接设置</h2>
      <span class="toggle open" id="connCardToggle">▶</span>
    </div>
    <div class="card-body">
      <!-- Import JSON -->
      <div class="form-grid" style="margin-bottom:16px;">
        <div class="form-group full">
          <label>导入 FTP_PHP_CONFIG（粘贴 JSON 环境变量）</label>
          <div style="display:flex;gap:8px;">
            <input type="text" id="importJson" placeholder='{"ftp_php_domain":"...","ftp_client_host":"...","ftp_client_username":"...",...}' style="flex:1;">
            <button class="btn btn-ghost btn-sm" onclick="doImportConfig()">导入</button>
          </div>
        </div>
      </div>

      <!-- Form fields -->
      <div class="form-grid">
        <div class="form-group full">
          <label>PHP 代理地址（ftp_php_domain）</label>
          <input type="text" id="fDomain" placeholder="留空则使用当前页面域名/api.php">
        </div>
        <div class="form-group">
          <label>API Key（ftp_php_apikey）</label>
          <input type="text" id="fApiKey" placeholder="留空 = 无认证">
        </div>
        <div class="form-group">
          <label>FTP 主机（host）</label>
          <input type="text" id="fHost" placeholder="ftp.example.com">
        </div>
        <div class="form-group">
          <label>端口（port）</label>
          <input type="number" id="fPort" value="21" style="max-width:120px;">
        </div>
        <div class="form-group">
          <label>用户名（username）</label>
          <input type="text" id="fUser" placeholder="anonymous">
        </div>
        <div class="form-group">
          <label>密码（password）</label>
          <input type="password" id="fPass" placeholder="密码">
        </div>
        <div class="form-group">
          <label>连接模式（connect_mode）</label>
          <select id="fMode"><option value="passive">Passive（被动）</option><option value="active">Active（主动）</option></select>
        </div>
        <div class="form-group">
          <label>协议（protocol）</label>
          <select id="fProtocol" onchange="onProtocolChange()"><option value="ftp">FTP</option><option value="ftps">FTPS</option></select>
        </div>
        <div class="form-group" id="tlsGroup" style="display:none;">
          <label>加密模式（encrypt_mode）</label>
          <select id="fTls"><option value="explicit">Explicit（显式）</option><option value="implicit">Implicit（隐式）</option></select>
        </div>
      </div>

      <!-- Buttons -->
      <div class="btn-row mt">
        <button class="btn btn-success" onclick="doTestConnection()">🔌 测试连接</button>
        <button class="btn btn-primary" onclick="doConnect()">📁 连接并浏览</button>
        <div style="flex:1;"></div>
        <button class="btn btn-ghost btn-sm" onclick="doExportConfig()">📋 导出配置</button>
        <button class="btn btn-ghost btn-sm" onclick="doSaveLocal()">💾 记住</button>
        <button class="btn btn-ghost btn-sm" onclick="doClearLocal()">🗑️ 清除</button>
      </div>

      <!-- Export Box -->
      <div id="exportArea" style="display:none;margin-top:14px;">
        <label style="font-size:.78rem;color:var(--text2);display:block;margin-bottom:4px;">FTP_PHP_CONFIG（点击复制）：</label>
        <div class="config-box" id="exportBox" onclick="copyExportConfig()" ontouchstart="this._ts=Date.now()" ontouchend="if(Date.now()-this._ts>400)copyExportConfig()">
          <span class="copy-hint">点击复制</span>
          <span id="exportText"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== TOOLBAR ===== -->
  <div class="toolbar" id="mainToolbar" style="display:none;">
    <button class="btn btn-ghost btn-sm" onclick="refreshList()">🔄 刷新</button>
    <button class="btn btn-success btn-sm" onclick="showUploadModal()">⬆️ 上传</button>
    <button class="btn btn-primary btn-sm" onclick="showMkdirModal()">📁 新建目录</button>
    <button class="btn btn-primary btn-sm" onclick="showNewFileModal()">📝 新建文件</button>
    <div class="spacer"></div>
    <span style="font-size:.78rem;color:var(--text3);" id="itemCount"></span>
  </div>

  <!-- ===== PATH BAR ===== -->
  <div class="pathbar" id="pathbar" style="display:none;"></div>

  <!-- ===== FILE TABLE ===== -->
  <div class="ftable-wrap" id="ftableWrap" style="display:none;position:relative;">
    <table class="ftable">
      <thead><tr>
        <th style="width:36px;"></th>
        <th>名称</th>
        <th class="col-size" style="width:100px;">大小</th>
        <th class="col-date" style="width:160px;">日期</th>
        <th style="width:180px;">操作</th>
      </tr></thead>
      <tbody id="fileBody"></tbody>
    </table>
  </div>

  <!-- ===== LOG ===== -->
  <div class="card collapsed" id="logCard">
    <div class="card-head" onclick="toggleCard('logCard')">
      <h2>📋 操作日志</h2>
      <span class="toggle" id="logCardToggle">▶</span>
    </div>
    <div class="card-body" style="padding:0;">
      <div class="log-body" id="logBody">等待操作...\n</div>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== UPLOAD MODAL ===== -->
<div class="modal-overlay" id="uploadModal">
<div class="modal modal-sm">
  <div class="modal-head"><h3>⬆️ 上传文件</h3><button class="close-btn" onclick="closeModal('uploadModal')">&times;</button></div>
  <div class="modal-body">
    <div class="form-group" style="margin-bottom:14px;">
      <label>远程目标路径（留空上传到当前目录）</label>
      <input type="text" id="uploadRemotePath" placeholder="/remote/path/">
    </div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('uploadFile').click()">
      <div class="uz-icon">📤</div>
      <div class="uz-text">点击选择文件，或拖拽文件到此处</div>
      <div class="uz-hint">支持任意文件类型</div>
      <input type="file" id="uploadFile" style="display:none" onchange="onFileSelected(event)">
    </div>
    <div id="uploadFileInfo" style="margin-top:10px;font-size:.83rem;color:var(--text2);"></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal('uploadModal')">取消</button>
    <button class="btn btn-success" onclick="doUpload()">上传</button>
  </div>
</div>
</div>

<!-- ===== MKDIR MODAL ===== -->
<div class="modal-overlay" id="mkdirModal">
<div class="modal modal-sm">
  <div class="modal-head"><h3>📁 新建目录</h3><button class="close-btn" onclick="closeModal('mkdirModal')">&times;</button></div>
  <div class="modal-body">
    <div class="form-group"><label>目录路径</label><input type="text" id="mkdirPath" placeholder="/new-folder"></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal('mkdirModal')">取消</button>
    <button class="btn btn-primary" onclick="doMkdir()">创建</button>
  </div>
</div>
</div>

<!-- ===== NEW FILE MODAL ===== -->
<div class="modal-overlay" id="newFileModal">
<div class="modal modal-sm">
  <div class="modal-head"><h3>📝 新建文件</h3><button class="close-btn" onclick="closeModal('newFileModal')">&times;</button></div>
  <div class="modal-body">
    <div class="form-group" style="margin-bottom:12px;"><label>文件路径</label><input type="text" id="newFilePath" placeholder="/path/file.txt"></div>
    <div class="form-group"><label>初始内容（可留空）</label><textarea id="newFileContent" rows="5" placeholder="文件内容..."></textarea></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal('newFileModal')">取消</button>
    <button class="btn btn-success" onclick="doNewFile()">创建</button>
  </div>
</div>
</div>

<!-- ===== MOVE MODAL ===== -->
<div class="modal-overlay" id="moveModal">
<div class="modal modal-sm">
  <div class="modal-head"><h3>📦 移动 / 重命名</h3><button class="close-btn" onclick="closeModal('moveModal')">&times;</button></div>
  <div class="modal-body">
    <div class="form-group" style="margin-bottom:12px;"><label>源路径</label><input type="text" id="moveFrom" readonly style="color:var(--text3);"></div>
    <div class="form-group"><label>目标路径</label><input type="text" id="moveTo" placeholder="/new/path"></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal('moveModal')">取消</button>
    <button class="btn btn-primary" onclick="doMove()">确定</button>
  </div>
</div>
</div>

<!-- ===== EDITOR MODAL ===== -->
<div class="modal-overlay" id="editorModal">
<div class="modal modal-lg" style="height:88vh;display:flex;flex-direction:column;">
  <div class="modal-head">
    <h3 id="editorTitle">✏️ 编辑文件</h3>
    <button class="close-btn" onclick="closeEditor()">&times;</button>
  </div>
  <div class="modal-body" style="display:flex;flex-direction:column;padding-bottom:8px;">
    <div class="editor-toolbar">
      <span class="fpath" id="editorFilePath">/file.txt</span>
      <span class="finfo" id="editorFileInfo"></span>
    </div>
    <div class="cm-wrap" id="cmWrap"></div>
    <div class="editor-status">
      <span id="editorCursor">行 1, 列 1</span>
      <span id="editorMode">text</span>
      <span id="editorModified" class="modified" style="display:none;">● 已修改</span>
      <div style="flex:1;"></div>
      <span style="font-size:.72rem;color:var(--text3);">Ctrl+F 搜索 · Ctrl+H 替换 · Ctrl+G 跳转行</span>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeEditor()">关闭</button>
    <button class="btn btn-success" id="editorSaveBtn" onclick="doSaveEditor()">💾 保存</button>
  </div>
</div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let currentPath = '/';
let cmEditor = null;
let editorOriginalContent = '';
let editorFilePath = '';
let isConnected = false;

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  loadFromLocal();
  // Drag & drop on upload zone
  const uz = document.getElementById('uploadZone');
  uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('dragover'); });
  uz.addEventListener('dragleave', () => uz.classList.remove('dragover'));
  uz.addEventListener('drop', e => {
    e.preventDefault(); uz.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
      document.getElementById('uploadFile').files = e.dataTransfer.files;
      onFileSelected({ target: { files: e.dataTransfer.files } });
    }
  });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => {
      if (m.id === 'editorModal') closeEditor();
      else m.classList.remove('active');
    });
  }
});

// ============================================================
// CARD TOGGLE
// ============================================================
function toggleCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('collapsed');
  const tog = document.getElementById(id + 'Toggle');
  tog.classList.toggle('open');
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type='info', duration=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), duration);
}

// ============================================================
// LOG
// ============================================================
function log(msg) {
  const el = document.getElementById('logBody');
  const ts = new Date().toLocaleTimeString();
  el.textContent += `[${ts}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

// ============================================================
// FORM HELPERS
// ============================================================
function getApiUrl() {
  const d = document.getElementById('fDomain').value.trim();
  if (d) return d;
  return window.location.href.replace(/\/[^/]*$/, '/api.php');
}
function getConn() {
  return {
    host: document.getElementById('fHost').value.trim(),
    port: parseInt(document.getElementById('fPort').value) || 21,
    username: document.getElementById('fUser').value.trim(),
    password: document.getElementById('fPass').value,
    mode: document.getElementById('fMode').value,
    protocol: document.getElementById('fProtocol').value,
    tls_mode: document.getElementById('fTls').value,
  };
}
function getApiKey() { return document.getElementById('fApiKey').value.trim(); }
function onProtocolChange() {
  document.getElementById('tlsGroup').style.display = document.getElementById('fProtocol').value === 'ftps' ? '' : 'none';
}

// ============================================================
// CONFIG IMPORT / EXPORT
// ============================================================
function doImportConfig() {
  const raw = document.getElementById('importJson').value.trim();
  if (!raw) { toast('请粘贴 JSON 配置', 'err'); return; }
  try {
    const c = JSON.parse(raw);
    if (c.ftp_php_domain) document.getElementById('fDomain').value = c.ftp_php_domain;
    if (c.ftp_php_apikey) document.getElementById('fApiKey').value = c.ftp_php_apikey;
    if (c.ftp_client_host) document.getElementById('fHost').value = c.ftp_client_host;
    if (c.ftp_client_port) document.getElementById('fPort').value = c.ftp_client_port;
    if (c.ftp_client_username) document.getElementById('fUser').value = c.ftp_client_username;
    if (c.ftp_client_password) document.getElementById('fPass').value = c.ftp_client_password;
    if (c.ftp_client_connect_mode) document.getElementById('fMode').value = c.ftp_client_connect_mode;
    if (c.ftp_client_protocol) { document.getElementById('fProtocol').value = c.ftp_client_protocol; onProtocolChange(); }
    if (c.ftp_client_encrypt_mode) document.getElementById('fTls').value = c.ftp_client_encrypt_mode;
    toast('配置已导入', 'ok');
    log('已从 JSON 导入配置');
  } catch (e) {
    toast('JSON 解析失败: ' + e.message, 'err');
  }
}

function buildConfigJson() {
  return JSON.stringify({
    ftp_php_domain: getApiUrl(),
    ftp_php_apikey: getApiKey(),
    ftp_client_host: document.getElementById('fHost').value.trim(),
    ftp_client_port: document.getElementById('fPort').value.trim(),
    ftp_client_username: document.getElementById('fUser').value.trim(),
    ftp_client_password: document.getElementById('fPass').value,
    ftp_client_connect_mode: document.getElementById('fMode').value,
    ftp_client_protocol: document.getElementById('fProtocol').value,
    ftp_client_encrypt_mode: document.getElementById('fTls').value,
  });
}

function doExportConfig() {
  const json = buildConfigJson();
  document.getElementById('exportText').textContent = json;
  document.getElementById('exportArea').style.display = 'block';
  log('配置已生成，点击复制');
}

function copyExportConfig() {
  const text = document.getElementById('exportText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    toast('已复制到剪贴板', 'ok');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('已复制到剪贴板', 'ok');
  });
}

function doSaveLocal() {
  localStorage.setItem('ftp_proxy_config', buildConfigJson());
  toast('配置已保存到浏览器', 'ok');
}
function doClearLocal() {
  localStorage.removeItem('ftp_proxy_config');
  toast('已清除保存的配置', 'info');
}
function loadFromLocal() {
  const saved = localStorage.getItem('ftp_proxy_config');
  if (saved) {
    document.getElementById('importJson').value = saved;
    doImportConfig();
    document.getElementById('importJson').value = '';
  }
}

// ============================================================
// API CALL
// ============================================================
async function apiCall(body, isFormData = false) {
  const url = getApiUrl();
  const key = getApiKey();
  const headers = {};
  if (key) headers['X-API-Key'] = key;
  let fetchBody;
  if (isFormData) {
    if (key) body.append('api_key', key);
    fetchBody = body;
  } else {
    headers['Content-Type'] = 'application/json';
    fetchBody = JSON.stringify({ ...getConn(), ...body });
  }
  const res = await fetch(url, { method: 'POST', headers, body: fetchBody });
  return res.json();
}

// ============================================================
// CONNECTION
// ============================================================
async function doTestConnection() {
  log('正在测试连接...');
  try {
    const r = await apiCall({ action: 'test' });
    if (r.code === 200) {
      toast('连接成功' + (r.data.pwd ? ' (pwd: ' + r.data.pwd + ')' : ''), 'ok');
      log('连接测试通过');
    } else {
      toast('连接失败: ' + r.message, 'err');
      log('连接失败: ' + r.message);
    }
  } catch (e) { toast('请求失败: ' + e.message, 'err'); log('错误: ' + e.message); }
}

async function doConnect() {
  currentPath = '/';
  isConnected = true;
  document.getElementById('mainToolbar').style.display = '';
  document.getElementById('pathbar').style.display = '';
  document.getElementById('ftableWrap').style.display = '';
  // collapse connection card
  if (!document.getElementById('connCard').classList.contains('collapsed')) toggleCard('connCard');
  await refreshList();
}

// ============================================================
// FILE LIST
// ============================================================
async function refreshList() {
  log('列出目录: ' + currentPath);
  showTableLoading(true);
  try {
    const r = await apiCall({ action: 'list', path: currentPath, detailed: true });
    if (r.code === 200) {
      renderPathbar();
      renderFiles(r.data.items || []);
      toast('已刷新', 'ok', 1500);
    } else {
      toast('列出失败: ' + r.message, 'err');
      log('列出失败: ' + r.message);
    }
  } catch (e) { toast('请求失败: ' + e.message, 'err'); }
  showTableLoading(false);
}

function showTableLoading(on) {
  let el = document.getElementById('ftableWrap').querySelector('.loading-overlay');
  if (on) {
    if (!el) {
      el = document.createElement('div');
      el.className = 'loading-overlay';
      el.innerHTML = '<div class="spinner" style="width:30px;height:30px;border-width:3px;"></div>';
      document.getElementById('ftableWrap').appendChild(el);
    }
  } else {
    if (el) el.remove();
  }
}

function renderPathbar() {
  const el = document.getElementById('pathbar');
  const parts = currentPath.split('/').filter(Boolean);
  let html = `<span class="seg" onclick="navTo('/')">🏠 /</span>`;
  let built = '';
  for (let i = 0; i < parts.length; i++) {
    built += '/' + parts[i];
    const p = built;
    const isLast = i === parts.length - 1;
    html += `<span class="sep">/</span>`;
    if (isLast) html += `<span class="current">${parts[i]}</span>`;
    else html += `<span class="seg" onclick="navTo('${p}')">${parts[i]}</span>`;
  }
  el.innerHTML = html;
}

function renderFiles(items) {
  const el = document.getElementById('fileBody');
  if (!items || items.length === 0) {
    el.innerHTML = `<tr><td colspan="5" class="empty-msg">此目录为空</td></tr>`;
    document.getElementById('itemCount').textContent = '';
    return;
  }

  // Sort: dirs first
  items.sort((a, b) => {
    if (a.type === 'dir' && b.type !== 'dir') return -1;
    if (a.type !== 'dir' && b.type === 'dir') return 1;
    return (a.name || '').localeCompare(b.name || '');
  });

  // Prepend .. if not root
  if (currentPath !== '/') {
    items.unshift({ name: '..', type: 'dir', _parent: true });
  }

  let html = '';
  for (const item of items) {
    const isDir = item.type === 'dir';
    const isLink = item.type === 'link';
    const fullPath = item._parent
      ? currentPath.replace(/\/[^/]+\/?$/, '') || '/'
      : currentPath.replace(/\/$/, '') + '/' + item.name;

    // icon
    let icon = '📄';
    if (isDir) icon = '📁';
    else if (isLink) icon = '🔗';
    else {
      const ext = (item.name || '').split('.').pop().toLowerCase();
      const imgExts = ['jpg','jpeg','png','gif','svg','webp','ico','bmp'];
      const codeExts = ['js','ts','jsx','tsx','py','php','rb','go','rs','c','cpp','h','java','cs','sh','bash','sql','vue','svelte'];
      const docExts = ['md','txt','log','csv','json','xml','yaml','yml','toml','ini','cfg','conf','env'];
      if (imgExts.includes(ext)) icon = '🖼️';
      else if (codeExts.includes(ext)) icon = '💻';
      else if (docExts.includes(ext)) icon = '📃';
      else if (['zip','tar','gz','bz2','rar','7z'].includes(ext)) icon = '📦';
      else if (['mp3','wav','ogg','flac','aac'].includes(ext)) icon = '🎵';
      else if (['mp4','mkv','avi','mov','webm'].includes(ext)) icon = '🎬';
      else if (['pdf'].includes(ext)) icon = '📕';
    }

    const nameClass = isDir ? 'fname fdir' : (isLink ? 'fname flink' : 'fname');
    const size = isDir ? '-' : formatSize(item.size);
    const date = item.date || '';

    // actions
    let actions = '';
    if (!item._parent) {
      const esc = fullPath.replace(/'/g, "\\'");
      if (isDir) {
        actions = `
          <button class="btn btn-ghost btn-xs btn-icon" onclick="showMoveModal('${esc}')" title="移动/重命名">📦</button>
          <button class="btn btn-danger btn-xs btn-icon" onclick="doDelete('${esc}',true)" title="删除目录">🗑️</button>`;
      } else {
        actions = `
          <button class="btn btn-primary btn-xs btn-icon" onclick="openEditor('${esc}')" title="编辑">✏️</button>
          <button class="btn btn-success btn-xs btn-icon" onclick="doDownload('${esc}')" title="下载">⬇️</button>
          <button class="btn btn-ghost btn-xs btn-icon" onclick="showMoveModal('${esc}')" title="移动/重命名">📦</button>
          <button class="btn btn-ghost btn-xs btn-icon" onclick="doCopy('${esc}')" title="复制">📋</button>
          <button class="btn btn-danger btn-xs btn-icon" onclick="doDelete('${esc}',false)" title="删除">🗑️</button>`;
      }
    }

    const clickAction = isDir
      ? `onclick="navTo('${fullPath.replace(/'/g, "\\'")}')" `
      : `onclick="openEditor('${fullPath.replace(/'/g, "\\'")}')" `;

    html += `<tr>
      <td>${icon}</td>
      <td><span class="${nameClass}" ${clickAction}>${item.name}</span></td>
      <td class="col-size" style="color:var(--text2);font-size:.82rem;">${size}</td>
      <td class="col-date" style="color:var(--text3);font-size:.78rem;">${date}</td>
      <td><div class="factions">${actions}</div></td>
    </tr>`;
  }
  el.innerHTML = html;

  const fileCount = items.filter(i => !i._parent && i.type !== 'dir').length;
  const dirCount = items.filter(i => !i._parent && i.type === 'dir').length;
  document.getElementById('itemCount').textContent = `${dirCount} 个目录, ${fileCount} 个文件`;
}

function navTo(path) { currentPath = path || '/'; refreshList(); }

// ============================================================
// EDITOR (CodeMirror)
// ============================================================
function detectMode(filename) {
  const ext = (filename || '').split('.').pop().toLowerCase();
  const map = {
    js: 'javascript', mjs: 'javascript', jsx: 'javascript', ts: 'javascript', tsx: 'javascript', json: 'application/json',
    html: 'htmlmixed', htm: 'htmlmixed', vue: 'htmlmixed', svelte: 'htmlmixed',
    css: 'css', scss: 'css', less: 'css',
    xml: 'xml', svg: 'xml', xhtml: 'xml', rss: 'xml',
    md: 'markdown', markdown: 'markdown',
    php: 'php', phtml: 'php',
    py: 'python', pyw: 'python',
    sh: 'shell', bash: 'shell', zsh: 'shell',
    sql: 'sql',
    yaml: 'yaml', yml: 'yaml',
    c: 'text/x-csrc', h: 'text/x-csrc', cpp: 'text/x-c++src', cxx: 'text/x-c++src',
    java: 'text/x-java', cs: 'text/x-csharp', kt: 'text/x-kotlin',
    go: 'text/x-go', rs: 'text/x-rustsrc',
  };
  return map[ext] || 'text/plain';
}

async function openEditor(path) {
  editorFilePath = path;
  document.getElementById('editorFilePath').textContent = path;
  document.getElementById('editorTitle').textContent = '✏️ ' + (path.split('/').pop() || path);
  document.getElementById('editorFileInfo').textContent = '加载中...';
  document.getElementById('editorModified').style.display = 'none';
  document.getElementById('editorModal').classList.add('active');

  // Init CodeMirror if needed
  if (!cmEditor) {
    cmEditor = CodeMirror(document.getElementById('cmWrap'), {
      value: '',
      theme: 'material-ocean',
      lineNumbers: true,
      matchBrackets: true,
      autoCloseBrackets: true,
      foldGutter: true,
      gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
      styleActiveLine: true,
      lineWrapping: true,
      tabSize: 2,
      indentWithTabs: false,
      extraKeys: {
        'Ctrl-S': () => doSaveEditor(),
        'Cmd-S': () => doSaveEditor(),
        'Ctrl-F': 'findPersistent',
        'Cmd-F': 'findPersistent',
        'Ctrl-H': 'replace',
        'Cmd-Option-F': 'replace',
        'Ctrl-G': 'jumpToLine',
        'Cmd-G': 'jumpToLine',
      }
    });
    cmEditor.on('cursorActivity', () => {
      const pos = cmEditor.getCursor();
      document.getElementById('editorCursor').textContent = `行 ${pos.line + 1}, 列 ${pos.ch + 1}`;
    });
    cmEditor.on('changes', () => {
      const modified = cmEditor.getValue() !== editorOriginalContent;
      document.getElementById('editorModified').style.display = modified ? '' : 'none';
    });
  }

  // Fetch file content
  log('正在读取: ' + path);
  try {
    const r = await apiCall({ action: 'read', path: path });
    if (r.code === 200) {
      const content = r.data.content ?? (r.data.content_base64 ? atob(r.data.content_base64) : '');
      editorOriginalContent = content;
      const mode = detectMode(path);
      cmEditor.setOption('mode', mode);
      cmEditor.setValue(content);
      cmEditor.clearHistory();
      cmEditor.refresh();
      setTimeout(() => cmEditor.refresh(), 100);
      document.getElementById('editorFileInfo').textContent = formatSize(r.data.size || content.length);
      document.getElementById('editorMode').textContent = typeof mode === 'string' ? mode.split('/').pop() : mode;
      log('文件已加载: ' + path);
    } else {
      toast('读取失败: ' + r.message, 'err');
      log('读取失败: ' + r.message);
    }
  } catch (e) {
    toast('读取错误: ' + e.message, 'err');
    log('错误: ' + e.message);
  }
}

async function doSaveEditor() {
  const content = cmEditor.getValue();
  log('正在保存: ' + editorFilePath);
  try {
    const r = await apiCall({ action: 'upload', remote_path: editorFilePath, content: content });
    if (r.code === 200) {
      editorOriginalContent = content;
      document.getElementById('editorModified').style.display = 'none';
      toast('已保存', 'ok');
      log('已保存: ' + editorFilePath);
    } else {
      toast('保存失败: ' + r.message, 'err');
      log('保存失败: ' + r.message);
    }
  } catch (e) { toast('保存错误: ' + e.message, 'err'); }
}

function closeEditor() {
  if (cmEditor && cmEditor.getValue() !== editorOriginalContent) {
    if (!confirm('文件已修改但未保存，确定关闭？')) return;
  }
  document.getElementById('editorModal').classList.remove('active');
  refreshList();
}

// ============================================================
// FILE OPERATIONS
// ============================================================
function doDownload(path) {
  log('下载: ' + path);
  const conn = getConn();
  const key = getApiKey();
  const form = document.createElement('form');
  form.method = 'POST'; form.action = getApiUrl(); form.target = '_blank';
  const fields = { ...conn, action: 'download', path, raw: '1' };
  if (key) fields.api_key = key;
  for (const [k, v] of Object.entries(fields)) {
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = k; inp.value = v;
    form.appendChild(inp);
  }
  document.body.appendChild(form); form.submit(); form.remove();
  log('下载已发起: ' + path);
}

async function doDelete(path, isDir) {
  if (!confirm(`确定要删除${isDir ? '目录' : '文件'}: ${path} ?`)) return;
  log('删除: ' + path);
  try {
    const r = await apiCall({ action: 'delete', path, is_dir: isDir });
    if (r.code === 200) { toast('已删除', 'ok'); log('已删除: ' + path); refreshList(); }
    else { toast('删除失败: ' + r.message, 'err'); log('删除失败: ' + r.message); }
  } catch (e) { toast('错误: ' + e.message, 'err'); }
}

async function doCopy(path) {
  const name = path.split('/').pop();
  const dir = path.substring(0, path.length - name.length);
  const dest = prompt('复制到:', dir + 'copy_' + name);
  if (!dest) return;
  log('复制: ' + path + ' → ' + dest);
  try {
    const r = await apiCall({ action: 'copy', from: path, to: dest });
    if (r.code === 200) { toast('已复制', 'ok'); refreshList(); }
    else toast('复制失败: ' + r.message, 'err');
  } catch (e) { toast('错误: ' + e.message, 'err'); }
}

// Move modal
function showMoveModal(path) {
  document.getElementById('moveFrom').value = path;
  document.getElementById('moveTo').value = path;
  document.getElementById('moveModal').classList.add('active');
}
async function doMove() {
  const from = document.getElementById('moveFrom').value;
  const to = document.getElementById('moveTo').value.trim();
  if (!to || to === from) { closeModal('moveModal'); return; }
  log('移动: ' + from + ' → ' + to);
  try {
    const r = await apiCall({ action: 'move', from, to });
    if (r.code === 200) { toast('已移动', 'ok'); closeModal('moveModal'); refreshList(); }
    else toast('移动失败: ' + r.message, 'err');
  } catch (e) { toast('错误: ' + e.message, 'err'); }
}

// Upload
function showUploadModal() {
  document.getElementById('uploadRemotePath').value = currentPath === '/' ? '/' : currentPath + '/';
  document.getElementById('uploadFile').value = '';
  document.getElementById('uploadFileInfo').textContent = '';
  document.getElementById('uploadModal').classList.add('active');
}
function onFileSelected(e) {
  const f = e.target.files[0];
  if (f) document.getElementById('uploadFileInfo').textContent = `已选: ${f.name} (${formatSize(f.size)})`;
}
async function doUpload() {
  const file = document.getElementById('uploadFile').files[0];
  if (!file) { toast('请选择文件', 'err'); return; }
  let rp = document.getElementById('uploadRemotePath').value.trim();
  if (!rp || rp.endsWith('/')) rp = (rp || '/') + file.name;
  log('上传: ' + file.name + ' → ' + rp);
  const fd = new FormData();
  const conn = getConn();
  for (const [k, v] of Object.entries(conn)) fd.append(k, String(v));
  fd.append('action', 'upload');
  fd.append('remote_path', rp);
  fd.append('file', file);
  try {
    const r = await apiCall(fd, true);
    if (r.code === 200) { toast('上传成功', 'ok'); closeModal('uploadModal'); refreshList(); }
    else toast('上传失败: ' + r.message, 'err');
  } catch (e) { toast('错误: ' + e.message, 'err'); }
}

// Mkdir
function showMkdirModal() {
  document.getElementById('mkdirPath').value = currentPath === '/' ? '/new-folder' : currentPath + '/new-folder';
  document.getElementById('mkdirModal').classList.add('active');
}
async function doMkdir() {
  const path = document.getElementById('mkdirPath').value.trim();
  if (!path) return;
  log('创建目录: ' + path);
  try {
    const r = await apiCall({ action: 'mkdir', path });
    if (r.code === 200) { toast('目录已创建', 'ok'); closeModal('mkdirModal'); refreshList(); }
    else toast('创建失败: ' + r.message, 'err');
  } catch (e) { toast('错误: ' + e.message, 'err'); }
}

// New file
function showNewFileModal() {
  document.getElementById('newFilePath').value = currentPath === '/' ? '/new-file.txt' : currentPath + '/new-file.txt';
  document.getElementById('newFileContent').value = '';
  document.getElementById('newFileModal').classList.add('active');
}
async function doNewFile() {
  const path = document.getElementById('newFilePath').value.trim();
  if (!path) return;
  const content = document.getElementById('newFileContent').value;
  log('创建文件: ' + path);
  try {
    const r = await apiCall({ action: 'upload', remote_path: path, content });
    if (r.code === 200) { toast('文件已创建', 'ok'); closeModal('newFileModal'); refreshList(); }
    else toast('创建失败: ' + r.message, 'err');
  } catch (e) { toast('错误: ' + e.message, 'err'); }
}

// ============================================================
// MODALS
// ============================================================
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ============================================================
// UTILS
// ============================================================
function formatSize(bytes) {
  if (bytes === null || bytes === undefined || bytes === '' || bytes < 0) return '-';
  if (bytes === 0) return '0 B';
  const u = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
}
